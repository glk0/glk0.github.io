<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Kossi Glokpor's web page</title>
        <link rel="icon" type="image/ico" href="favicon.ico">
        <meta name="description" content="Kossi's web page and blog.">
        <meta property="og:title" content="Kossi Glokpor's web page."/>
        <meta property="og:description" content="Kossi's blog. I share my work and thoughts here." />
        <meta property="og:image" content="https://glk0.me/glk0.jpg" />
    </head>
    <body>
        <div class = "top-box">
            <div class="main-container">
                <div class="desc-wrapper">
                    <div class="portrait"></div>
                    <span style="transform: translateY(-24px);font-weight: bold;font-size: 20px;">glk0</span>
                    <p class="description">
                        Hi, I'm Kossi Glokpor, a student at the National School of Applied 
                        Science of Fes, Morocco
			<a href = "https://leetcode.com/glk0/">interested</a> in
			<a href = "https://leetcode.com/glk0/">programming</a>
			<!--
			I share stuff I learn on my <a href = "./blog/">blog</a>. I also have a
			<a href = "https://github.com/glk0">github</a> 
			and a 
			<a href = "https://leetcode.com/glk0/">leetcode</a> account.
			<br>A list some useful links is <a href = "./links.html">here</a>.
			-->
                    </p>
                </div>
                <span class="contact">Reach me with</span>
                <div class="social">
                    <ul>
                        <li><a href="https://twitter.com/glk_em">
                            <img src="assets/twitter.png">
                        </a></li>
                        <li><a href="https://www.linkedin.com/in/glk0/">
                            <img src="assets/linkedin.png">
                        </a></li>
                        <li><a href="https://github.com/glk0/">
                            <img src="assets/github.png">
                        </a></li>
                        <li><a href="mailto:k@glk0.tech">
                            <img src="assets/mail.png">
                        </a></li>
                    </ul>
                </div>
            </div>
        </div>
        <style>
            html {
		--background-color:#f8f8f8;
		--text-color : #444;
            }
	    html.dark {
		--bg-color : #232328;
		--text-color:#c0c0c4;
            }
	    html {
		color : var(--text-color);
		background-color: var(--bg-color);
	    }
            html, body, .top-box {
                position: absolute;
                min-height: 100vh;
                width: 100%;
                margin: 0;
                font-family: monospace;
            }
            .main-container {
                display: flex;
		min-height : 90vh;
                flex-direction: column;
                width: 100vw;
                justify-content: center;
                align-items: center;
                font-size: 16px;
            }
            .desc-wrapper {
                display: flex;
                flex-direction: column;
                margin: 50px 25px 0px 25px ;
                max-width: 450px;
                align-items: center;
            }
	    .desc-wrapper a, .desc-wrapper  a:visited {
		color: var(--text-color);
	    }
	    .desc-wrapper a:hover {
		font-weight: bold;
	    }
            .portrait {
                width: 125px;
                height: 125px;
                border-radius: 50%;
                background-image: url("assets/glk0.jpg");
                background-size: cover;
                margin: 30px 0px 60px 0px;
            }
            .description {
                line-height: 24px;
                margin-top: 0px;
            }
            .contact {
                margin: 15px auto;
            }
            .social > ul {
                display: flex;
                list-style-type: none;
                flex-direction: row;
                padding: 0px;
                justify-content: space-between;
                max-width: 300px;
                width: 90vw;
            }
            html.dark .social > ul > li > a > img {
                filter: invert()
            }
            .social > ul > li > a > img {
                height: 30px;
                width: 30px;
                opacity: 0.7;
            }
            .social > ul > li > a > img:hover {
                opacity: 1;
            }
        </style>
        <script>
            let date = new Date;
        if (
            (date.getHours() > 22 || date.getHours() < 6) // It's night 
                ||
            (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) // Browser in fark mode
            ) {
            document.documentElement.classList.add("dark") // Toggle dark mode
        }
        </script>
    </body>
</html>
