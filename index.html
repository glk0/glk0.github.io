        <style>
            html {
                background-color: #f8f8f8;
                color: #444;
            }
            html.dark {
                background-color: #232328;
                color: #c0c0c4;
            }
            html, body, .top-box {
                position: absolute;
                min-height: 100vh;
                width: 100%;
                margin: 0;
                font-family: monospace;
            }
            .main-container {
                display: flex;
                flex-direction: column;
                width: 100vw;
                justify-content: center;
                align-items: center;
                font-size: 16px;
            }
            .desc-wrapper {
                display: flex;
                flex-direction: column;
                margin: 50px 30px 0px 30px ;
                max-width: 450px;
                align-items: center;
            }
            .portrait {
                width: 125px;
                height: 125px;
                border-radius: 50%;
                background-image: url("assets/glk0.jpg");
                background-size: cover;
                margin: 30px 0px 60px 0px;
            }
            .description {
                line-height: 24px;
                margin-top: 0px;
            }
            .contact {
                margin: 15px auto;
            }
            .social > ul {
                display: flex;
                list-style-type: none;
                flex-direction: row;
                padding: 0px;
                justify-content: space-between;
                max-width: 240px;
                width: 100vw;
            }
            html.dark .social > ul > li > a > img {
                filter: invert()
            }
            .social > ul > li > a > img {
                height: 30px;
                width: 30px;
                opacity: 0.7;
            }
            .social > ul > li > a > img:hover {
                opacity: 1;
            }
            .copyright {
                width: 100%;
                position: absolute;
                bottom: 40px;
                left: 0px;
                font-weight: bold;
                opacity: 0.7;
                text-align: center;
                font-size: 11px;
            }
        </style>
        <script>
            let date = new Date;
        if (
            (date.getHours() > 22 || date.getHours() < 6) // It's night 
                ||
            (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) // Browser in fark mode
            ) {
            document.documentElement.classList.add("dark") // Toggle dark mode
        }
        </script>
