        <style>
            html {

            html.dark {

            html {

                background-color: var(--bg-color);

            html, body, .top-box {

            .main-container {

            }
            .desc-wrapper a, .desc-wrapper  a:visited, .contact a, .contact a:visited {

            }
            .desc-wrapper a:hover, .contact a:hover {
